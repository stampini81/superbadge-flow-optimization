name: Metadata Validation

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Salesforce metadata files
        run: python scripts/validate_metadata.py
